name: Minestrator-Restart
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00
    - cron: '0 5 * * *'   # 北京时间 13:00
    - cron: '0 9 * * *'   # 北京时间 17:00
    - cron: '0 13 * * *'  # 北京时间 21:00

jobs:
  run_minestrator_restart:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver
          seleniumbase install chrome

      - name: Export all secrets to env vars
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: 🛡️ Launch sing-box if VLINK set
        if: ${{ env.VLINK != '' }}
        run: |
          curl -LO https://amd64.ssss.nyc.mn/sb
          chmod +x sb
          python link_to_sb.py "$VLINK" > v.json
          cat v.json
          nohup ./sb run -c v.json > /dev/null 2>&1 &
          sleep 3
          echo "LOCAL_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "✅ sing-box 已启动"
          curl -s -x socks5://127.0.0.1:1080 https://api.ipify.org

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          MINESTRATOR_ACCOUNT: ${{ secrets.MINESTRATOR_ACCOUNT }}
          MINESTRATOR_SERVER_ID: ${{ secrets.MINESTRATOR_SERVER_ID }}
          MINESTRATOR_AUTH: ${{ secrets.MINESTRATOR_AUTH }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          export DISPLAY=:1
          Xvfb :1 -ac &
          python restart_minestrator.py

      - name: 📸 上传截图（调试用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
