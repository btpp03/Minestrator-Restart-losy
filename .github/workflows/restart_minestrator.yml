name: Minestrator-Restart
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00
    - cron: '0 5 * * *'   # 北京时间 13:00
    - cron: '0 9 * * *'   # 北京时间 17:00
    - cron: '0 13 * * *'  # 北京时间 21:00

jobs:
  run_minestrator_restart:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: Install Chrome + Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb
          wget -q -O google-chrome-stable_current_amd64.deb https://mirror-us-stl1.armbian.airframes.io/apt/pool/bookworm-desktop/g/google-chrome-stable/google-chrome-stable_144.0.7559.59-1_amd64.deb
          sudo apt-get install -y -qq --allow-downgrades ./google-chrome-stable_current_amd64.deb
          sudo apt-get install -y -qq language-pack-zh-hans fonts-wqy-zenhei fonts-wqy-microhei
          google-chrome --version

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export all secrets to env vars
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: 🛡️ Launch sing-box if VLINK set
        if: ${{ env.VLINK != '' }}
        run: |
          curl -LO https://amd64.ssss.nyc.mn/sb
          chmod +x sb
          python link_to_sb.py "$VLINK" > v.json
          cat v.json
          nohup ./sb run -c v.json > /dev/null 2>&1 &
          sleep 3
          echo "LOCAL_PROXY=socks5://127.0.0.1:1080" >> $GITHUB_ENV
          echo "✅ sing-box 已启动"
          curl -s -x socks5://127.0.0.1:1080 https://api.ipify.org

      - name: 🐍 安装 Python 依赖
        run: pip install DrissionPage requests

      - name: Start Xvfb
        run: Xvfb :1 -ac &

      - name: 🚀 运行 DrissionPage 脚本
        env:
          PYTHONIOENCODING: utf-8
          MINESTRATOR_ACCOUNT: ${{ secrets.MINESTRATOR_ACCOUNT }}
          MINESTRATOR_SERVER_ID: ${{ secrets.MINESTRATOR_SERVER_ID }}
          MINESTRATOR_AUTH: ${{ secrets.MINESTRATOR_AUTH }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
          DISPLAY: :1
        run: xvfb-run -a python restart_minestrator_dp.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
